<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Omar's Ultimate Quiz</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background: #121212;
    color: #f5f5f5;
    text-align: center;
    margin: 0;
}
.container {
    width: 90%;
    max-width: 700px;
    margin: 50px auto;
    background: rgba(30,30,30,0.85);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 30px #000;
    transition: opacity 0.5s ease, transform 0.5s ease;
}
button {
    display: block;
    width: 100%;
    margin: 12px 0;
    padding: 14px;
    border-radius: 10px;
    border: 2px solid transparent;
    background: #1f8ef1;
    color: #fff;
    font-size: 17px;
    cursor: pointer;
    transition: 0.3s ease;
}
button:hover { background: #0f6fc1; }
.correct { border: 3px solid #00ff88; background: #006644; }
.wrong { border: 3px solid #ff4d4d; background: #661111; }
img { width: 80px; display: block; margin: 0 auto 5px auto; }
.fade-out { opacity: 0; transform: translateX(-20px); }
.fade-in { opacity: 1; transform: translateX(0); }
.answers-list { margin-top: 15px; }
.feedback { margin: 10px 0 0 0; font-size: 16px; }
.score-section { margin-top: 30px; text-align: left; }
.score-section h3 { margin-bottom: 15px; }
.score-section p { margin: 5px 0; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="container" id="quiz">
    <h2 id="question"></h2>
    <div id="answers" class="answers-list"></div>
    <p id="feedback" class="feedback"></p>
</div>

<div class="container hidden" id="result">
    <h2>Quiz Finished!</h2>
    <p id="scoreDisplay"></p>
    <p id="phraseDisplay" style="font-weight:bold; font-size:18px;"></p>
    <div id="allAnswers" class="score-section"></div>
    <button onclick="restartQuiz()">Restart Quiz</button>
</div>

<script>
const quizData = [
{question:"Where haven't I traveled before?", answers:["Dokohlye","Dahab","Alexandria","Sharm El Sheikh"], correct:1},
{question:"What's my Favourite Subject?", answers:["Math","Chemistry","Computer Science","Physics"], correct:3},
{question:"What Sport do I play the LOVE?", answers:["Tennis","Football","Handball","Swimming"], correct:0},
{question:"How tall is Omar?", answers:["6.0","5.11","5.6","5.8"], correct:1},
{question:"What’s Omar’s username?", answers:["omarhosny_222","omarhosny_2702","omarhosny_","omarhosny_272"], correct:0},
{question:"What’s Omar’s favourite drink?", answers:["Sprite","<img src='https://upload.wikimedia.org/wikipedia/commons/6/6f/7up_logo.svg'> 7up","Fayrouz","Coca-Cola"], correct:2},
{question:"What’s Omar’s coffee order?", answers:["Iced latte","Black coffee","Pike Place Roast","Iced espresso"], correct:0},
{question:"What’s Omar’s favourite place to eat at?", answers:["<img src='https://upload.wikimedia.org/wikipedia/commons/4/4e/McDonald%27s_Golden_Arches.svg'> McDonald's","Holmes","<img src='https://upload.wikimedia.org/wikipedia/commons/d/d2/Pizza_Hut_logo.svg'> Pizza Hut","<img src='https://upload.wikimedia.org/wikipedia/commons/7/7a/Papa_Johns_logo.svg'> Papa Johns"], correct:1},
{question:"What account he doesn’t have?", answers:["<img src='https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg'> ChatGPT","X","Threads","<img src='https://upload.wikimedia.org/wikipedia/commons/8/8c/Among_Us_Logo.svg'> Among Us"], correct:3},
{question:"What was your first impression of me?", answers:["A quiet kid","A yapper","An asshole","A lonely kid"], correct:null},
{question:"Who is my Fav teacher?", answers:["Shinoda Hanna","Reem Shata","Youssef Adel","Omar Abbas"], correct:3},
{question:"What app do I use the most?", answers:["TikTok","Instagram","Facebook","Telda"], correct:0},
{question:"What game did I used to play A LOT?", answers:["Fortnite","Minecraft","Roblox","League of Legends"], correct:0},
{question:"Who does Omar like most?", answers:["Bella","Mariam","Salma","Hala"], correct:0},
{question:"What game have I never played?", answers:["League of Legends","Brawl Stars","Extreme Car Driving Simulator","PUBG"], correct:0},
{question:"What Sport have I never played?", answers:["Basketball","Football","Handball","Swimming"], correct:2},
{question:"If Omar could have one cheat power in real life, what would it be?", answers:["Invisibility","Teleportation","Mind-reading","Infinite snacks"], correct:0},
{question:"Which Marvel character does Omar relate to most?", answers:["Spider-Man","Iron Man","Deadpool","Doctor Strange"], correct:0},
{question:"What’s Omar most likely to do when bored at home?", answers:["Play tennis","Mess around on PC","Make memes","Sleep"], correct:1},
{question:"How does Omar usually flirt/playfully interact with someone he likes?", answers:["Acts dumb","Teases them","Sends memes","Pretends not to care"], correct:0},
{question:"What kind of vibe does Omar prefer in friends?", answers:["Chill","Funny","Competitive","Smart"], correct:1},
{question:"If Omar could instantly master a skill, what would it be?", answers:["Tennis pro","Chess grandmaster","Coding wizard","Cooking genius"], correct:0},
{question:"Omar’s favourite type of chocolate?", answers:["Dark","Milk","White","Crunchy"], correct:1},
{question:"What’s Omar most likely to do in a video game?", answers:["Go stealth","Go loud and chaotic","Build stuff","Explore"], correct:0},
{question:"Which nickname would suit Omar best according to his personality?", answers:["Lazy Cow","Meme King","Playful Genius","Sporty Boy"], correct:0},
{question:"If Omar could go on a spontaneous trip, where would he pick?", answers:["Beach","Mountains","City","Anywhere with friends"], correct:3},
{question:"What’s Omar’s “oops I did dumb stuff” move?", answers:["Creeping online","Acting overly dumb","Accidentally embarrassing himself","All of the above"], correct:3},
{question:"If Omar had a sidekick in life, who would it be like?", answers:["A smart strategist","A funny goof","A chill helper","A secret hacker"], correct:1},
{question:"What’s Omar’s favourite console/game setup?", answers:["PC","Xbox","PlayStation","Switch"], correct:1},
{question:"If Omar could instantly learn one language, what would it be?", answers:["Japanese","Spanish","Russian","Arabic dialects"], correct:1},
{question:"Omar’s reaction when someone annoys him?", answers:["Laugh it off","Get salty","Play dumb","Ignore"], correct:2},
{question:"If Omar could be a cartoon character for a day, who would he be?", answers:["Mickey","SpongeBob","Tom","Jerry"], correct:0},
{question:"Favourite Marvel movie?", answers:["Spider-Man 2","Avengers Endgame","Iron Man 3","Any cartoonish MCU"], correct:0},
{question:"Omar’s top school strategy?", answers:["Ace everything","Chill and slide by","Mess around but learn","All-out social"], correct:2},
{question:"If Omar could prank someone, who would he pick?", answers:["Moataz","Eric","Mohamed","Abdelrahman"], correct:3},
{question:"Favourite snack while gaming?", answers:["Chocolate","Chips","Soda","Ice cream"], correct:0},
{question:"Who was Omar’s first crush?", answers:["Salma","Mariam","Hala","Bella"], correct:0}
];

// Savage phrases for score ranges (0-39) + 40
const phrases = [
"You probably shouldn't be trusted with this info…",
"Totally clueless and proud of it.",
"Needs more practice in life and quizzes.",
"Not even close to knowing Omar.",
"Lost cause at life skills too?",
"Seriously, what were you thinking?",
"Blindfolded and still missed it.",
"Random button presser extraordinaire.",
"Did you even read the questions?",
"Maybe try talking to Omar first?",
"Clueless mode activated.",
"Failed but at least you tried.",
"Keep guessing, you might learn.",
"Completely off the radar.",
"You might need a friend to help.",
"Missed all the important vibes.",
"Oops, still lost.",
"Zero insight into Omar detected.",
"Score’s low, ego’s high maybe?",
"Terrible memory on display.",
"Never gonna pass friend level 101.",
"All the wrong moves, all the time.",
"Lost in translation (and quiz).",
"Full-on noob status.",
"Congrats, you’re the opposite of a genius.",
"Half-knowledge or none at all?",
"You probably know him more than your mom." // 40/40 phrase
];

let currentQuestion = 0;
let score = 0;
let userAnswers = [];

// Shuffle array helper
function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

// Shuffle questions initially
shuffleArray(quizData);

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const quizContainer = document.getElementById("quiz");
const resultContainer = document.getElementById("result");
const scoreDisplay = document.getElementById("scoreDisplay");
const phraseDisplay = document.getElementById("phraseDisplay");
const allAnswers = document.getElementById("allAnswers");

function loadQuestion(){
    feedbackEl.textContent = "";
    questionEl.innerHTML = quizData[currentQuestion].question;
    answersEl.innerHTML="";

    // Shuffle answers visually
    let answersShuffled = quizData[currentQuestion].answers.map((a,i)=>({text:a,index:i}));
    shuffleArray(answersShuffled);

    answersShuffled.forEach(ansObj=>{
        let btn = document.createElement('button');
        btn.innerHTML = ansObj.text;
        btn.dataset.correct = ansObj.index === quizData[currentQuestion].correct ? "true" : "false";
        btn.onclick = ()=>checkAnswer(btn);
        answersEl.appendChild(btn);
    });
}

function checkAnswer(btnClicked){
    const buttons = answersEl.querySelectorAll("button");
    let current = quizData[currentQuestion];

    buttons.forEach(b => {
        b.disabled = true;
        if(b.dataset.correct === "true") b.classList.add('correct');
    });

    if(btnClicked.dataset.correct === "true"){
        score++;
        feedbackEl.textContent = "✅ Correct!";
    } else {
        btnClicked.classList.add('wrong');
        feedbackEl.textContent = "❌ Wrong! Correct answer highlighted";
    }

    userAnswers.push({question:current.question, selectedAnswer: btnClicked.innerHTML, correctAnswer: current.correct !== null ? current.answers[current.correct] : "Opinion"});

    setTimeout(()=>{
        quizContainer.classList.add("fade-out");
        setTimeout(()=>{
            currentQuestion++;
            if(currentQuestion<quizData.length){ 
                loadQuestion(); 
                quizContainer.classList.remove("fade-out"); 
                quizContainer.classList.add("fade-in"); 
            } else { 
                showResults(); 
            }
        },500);
    },1500);
}

function showResults(){
    quizContainer.classList.add("hidden");
    resultContainer.classList.remove('hidden');
    scoreDisplay.textContent = `Your score: ${score} / ${quizData.length}`;
    phraseDisplay.textContent = score === 40 ? phrases[25] : phrases[Math.min(score-1, phrases.length-2)];
    allAnswers.innerHTML = "<h3>Correct Answers:</h3>";
    userAnswers.forEach((ua,i)=>{
        let p = document.createElement("p");
        p.innerHTML = `Q${i+1}: Your answer: ${ua.selectedAnswer} | Correct answer: ${ua.correctAnswer}`;
        allAnswers.appendChild(p);
    });
}

function restartQuiz(){
    currentQuestion=0;
    score=0;
    userAnswers=[];
    resultContainer.classList.add("hidden");
    quizContainer.classList.remove("hidden");
    shuffleArray(quizData);
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
